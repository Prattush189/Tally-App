<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Tally Dashboard Sync</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h1>Tally Dashboard Sync</h1>
  <p class="hint">
    One-time setup. Fill in the portal username + password below and the extension will auto-login when you open the Tally portal — you only need to click TallyPrime, the Sync button takes it from there.
  </p>
  <form id="cfg">
    <label>
      Supabase URL
      <input type="text" id="supabaseUrl" placeholder="https://vqusztwxrjokjgkiebem.supabase.co" required>
    </label>
    <label>
      Supabase anon key
      <input type="password" id="supabaseAnonKey" placeholder="eyJhbGciOi..." required>
      <span class="subtitle">Project API keys → anon public</span>
    </label>
    <label>
      Sync token
      <input type="password" id="syncToken" placeholder="Matches LOCAL_SYNC_TOKEN in Supabase" required>
    </label>
    <label>
      Portal username
      <input type="text" id="portalUser" placeholder="e.g. prattush@…" autocomplete="off">
      <span class="subtitle">Optional. If filled, the extension auto-logs-in when you visit the portal.</span>
    </label>
    <label>
      Portal password
      <input type="password" id="portalPass" placeholder="Portal password" autocomplete="new-password">
      <span class="subtitle">Stored only in this browser's chrome.storage.local — never sent anywhere except the portal itself.</span>
    </label>
    <label>
      Tally company (inside portal)
      <input type="text" id="company" placeholder="UNITED AGENCIES DISTRIBUTORS LLP">
    </label>
    <label>
      Tenant key
      <input type="text" id="tenantKey" placeholder="default" value="default">
      <span class="subtitle">Leave as 'default' unless you're syncing multiple companies.</span>
    </label>
    <button type="submit">Save</button>
  </form>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
