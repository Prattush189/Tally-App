name: Deploy Supabase (Functions + Migrations)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/migrations/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-supabase.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: vqusztwxrjokjgkiebem
    steps:
      - name: Guard against missing token
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set. Generate one at https://supabase.com/dashboard/account/tokens and add it under Settings → Secrets and variables → Actions → New repository secret."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$PROJECT_REF"

      # Best-effort migration history repair. If prior deploys left orphans
      # in supabase_migrations.schema_migrations (e.g. from renamed files or
      # partial applies), this smooths them over so `db push` doesn't bail
      # with "Remote migration versions not found in local migrations
      # directory." Continues on error — if there's nothing to repair, the
      # CLI exits non-zero but that's fine.
      - name: Repair migration history (best-effort)
        if: ${{ env.SUPABASE_DB_PASSWORD != '' }}
        continue-on-error: true
        run: |
          # Mark any remote-only versions as reverted so `db push` stops
          # complaining about drift. We grep the push dry-run output for
          # versions and repair each one.
          set +e
          PUSH_DRY=$(supabase db push --password "$SUPABASE_DB_PASSWORD" --dry-run 2>&1)
          echo "$PUSH_DRY"
          echo "$PUSH_DRY" | grep -oE '20[0-9]{6,12}' | sort -u | while read -r VERSION; do
            echo "Repairing orphan migration version $VERSION"
            supabase migration repair --status reverted "$VERSION" --password "$SUPABASE_DB_PASSWORD" || true
          done

      - name: Push migrations
        # NOT fatal if this fails. Migrations are bookkeeping; the edge
        # function deploy below is what actually ships the app's fixes
        # (portal auto-login, abort handling, multi-company sync, etc.).
        # We want the functions to land even when the migration history
        # has drifted — the user can reconcile the schema separately via
        # `supabase db pull` on their workstation.
        if: ${{ env.SUPABASE_DB_PASSWORD != '' }}
        continue-on-error: true
        run: supabase db push --password "$SUPABASE_DB_PASSWORD"

      - name: Warn if migrations skipped
        if: ${{ env.SUPABASE_DB_PASSWORD == '' }}
        run: |
          echo "::warning::SUPABASE_DB_PASSWORD secret not set — skipping `supabase db push`. Add the DB password from Dashboard → Settings → Database to enable schema deploys."

      - name: Deploy tally function
        run: supabase functions deploy tally --project-ref "$PROJECT_REF"

      # Ai-suggest was added in PR #3 for the Gemini-powered Actions &
      # Outreach cards. Needs its own deploy step so the new function
      # actually ships. Non-blocking — a failure here shouldn't tank the
      # tally function deploy above.
      - name: Deploy ai-suggest function
        continue-on-error: true
        run: supabase functions deploy ai-suggest --project-ref "$PROJECT_REF"
