name: Deploy Supabase (Functions + Migrations)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/migrations/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-supabase.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: vqusztwxrjokjgkiebem
    steps:
      - name: Guard against missing token
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set. Generate one at https://supabase.com/dashboard/account/tokens and add it under Settings → Secrets and variables → Actions → New repository secret."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$PROJECT_REF"

      - name: Push migrations
        # Fails loudly if SUPABASE_DB_PASSWORD isn't set — needed to open a DB
        # connection for schema changes. Functions deploy below doesn't need it.
        if: ${{ env.SUPABASE_DB_PASSWORD != '' }}
        run: supabase db push --password "$SUPABASE_DB_PASSWORD"

      - name: Warn if migrations skipped
        if: ${{ env.SUPABASE_DB_PASSWORD == '' }}
        run: |
          echo "::warning::SUPABASE_DB_PASSWORD secret not set — skipping `supabase db push`. Add the DB password from Dashboard → Settings → Database to enable schema deploys."

      - name: Deploy tally function
        run: supabase functions deploy tally --project-ref "$PROJECT_REF"
