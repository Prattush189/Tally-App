name: Tally Scheduled Sync

# Runs the Playwright sync tool in GitHub's Ubuntu runner on an hourly cron,
# and on manual trigger from the admin UI (which calls the edge function's
# trigger-sync action → workflow_dispatch here).
#
# Repo secrets required:
#   SUPABASE_URL           — e.g. https://<ref>.supabase.co
#   SUPABASE_ANON_KEY      — project anon key
#   LOCAL_SYNC_TOKEN       — matches the edge function's LOCAL_SYNC_TOKEN secret
#
# ~2 min per run × 24 runs/day × 30 days ≈ 1440 min/month — fits in GitHub's
# 2000-min free tier for private repos. Bump to every 30 min only if the repo
# is public (unlimited) or you're willing to pay ~$7/mo overage.

on:
  workflow_dispatch:
    inputs:
      tenant_key:
        description: 'Tenant slug (matches tally_portal_config row)'
        required: false
        default: 'default'
  schedule:
    # Hourly, at minute 7 to stay out of the way of the top-of-hour rush.
    - cron: '7 * * * *'

concurrency:
  # Serialise runs per tenant — if a cron tick lands on a manual trigger,
  # wait instead of running two Playwright browsers against the same portal.
  group: tally-sync-${{ github.event.inputs.tenant_key || 'default' }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: tools/tally-sync-local
    steps:
      - name: Guard against missing secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          LOCAL_SYNC_TOKEN: ${{ secrets.LOCAL_SYNC_TOKEN }}
        run: |
          missing=""
          [ -z "$SUPABASE_URL" ] && missing="$missing SUPABASE_URL"
          [ -z "$SUPABASE_ANON_KEY" ] && missing="$missing SUPABASE_ANON_KEY"
          [ -z "$LOCAL_SYNC_TOKEN" ] && missing="$missing LOCAL_SYNC_TOKEN"
          if [ -n "$missing" ]; then
            echo "::error::Missing repo secrets:$missing. Add them under Settings → Secrets and variables → Actions."
            exit 1
          fi
        working-directory: .

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tools/tally-sync-local/package-lock.json

      - name: Install deps
        # package-lock.json may or may not be committed. If not, fall back to
        # npm install. Playwright's postinstall pulls Chromium automatically.
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Run sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          LOCAL_SYNC_TOKEN: ${{ secrets.LOCAL_SYNC_TOKEN }}
          TENANT_KEY: ${{ github.event.inputs.tenant_key || 'default' }}
        run: node sync.mjs

      - name: Upload Playwright trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace-${{ github.run_id }}
          path: tools/tally-sync-local/trace-*.zip
          if-no-files-found: ignore
          retention-days: 7
