# Supabase CLI config. Project ref is pinned so `supabase link` only needs to be
# run once per machine (no --project-ref flag needed on subsequent commands).
project_id = "vqusztwxrjokjgkiebem"

[functions.tally]
# JWT verification is OFF because Supabase projects on the new publishable-key
# format (sb_publishable_...) issue ES256-signed session tokens, which the
# Edge Function runtime's built-in verifier doesn't support yet.
# The function is still protected at the platform level — callers must send
# the project anon key via the "apikey" header, which supabase-js does
# automatically. Tally credentials live in server-side secrets.
verify_jwt = false
